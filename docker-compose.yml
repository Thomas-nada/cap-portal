services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cap_portal
      POSTGRES_USER: cap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cap -d cap_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://cap:${POSTGRES_PASSWORD}@postgres:5432/cap_portal
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  backup:
    build: ./backup
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://cap:${POSTGRES_PASSWORD}@postgres:5432/cap_portal
      RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
